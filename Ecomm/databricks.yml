# This is a Databricks asset bundle definition for Ecomm_Project.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: Ecomm_Project
  uuid: ec2d91fb-5431-4b34-ab24-72e6a5c60800

include:
  - resources/*.yml
  - resources/*/*.yml

artifacts:
  python_artifact:
    type: whl
    build: uv build --wheel

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev: 
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: http://127.0.0.1:7073
    variables:
      catalog: phase2_dev
  uat: 
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    workspace:
      host: http://127.0.0.1:7073
    variables:
      catalog: phase2_uat
  prod:
    mode: production
    workspace:
      host: http://127.0.0.1:7073
      # We explicitly deploy to /Workspace/Users/yraj6657@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/yraj6657@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: phase2_prod
    permissions:
      - user_name: yraj6657@gmail.com
        level: CAN_MANAGE
