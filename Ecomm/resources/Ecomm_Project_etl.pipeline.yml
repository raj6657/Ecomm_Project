# The main pipeline for Ecomm_Project

resources:
  pipelines:
    Ecomm_Project_etl:
      name: Ecomm_Project_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      root_path: "../src/Ecomm_Project_etl"

      libraries:
        - glob:
            include: ../src/Ecomm_Project_etl/transformations/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
