resources:
  jobs:
    New_Job:
      name: Phase2_automated_job
      tasks:
        - task_key: bronze
          notebook_task:
            notebook_path: ../src/bronze
            source: WORKSPACE
        - task_key: silver
          depends_on:
            - task_key: bronze
          notebook_task:
            notebook_path: ../src/silver
            source: WORKSPACE
        - task_key: gold
          depends_on:
            - task_key: silver
          notebook_task:
            notebook_path: ../src/gold
            source: WORKSPACE
      queue:
        enabled: true
      performance_target: PERFORMANCE_OPTIMIZED
